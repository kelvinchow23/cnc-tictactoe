<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC Tic-Tac-Toe</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="top-bar">
        <h1>CNC Tic-Tac-Toe</h1>
        <div id="setup" class="controls">
            <select id="mode">
                <option value="SinglePlayer">vs AI</option>
                <option value="TwoPlayer">Two Player</option>
            </select>
            <select id="difficulty">
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
            </select>
            <select id="symbol">
                <option value="X">Play as X</option>
                <option value="O">Play as O</option>
            </select>
            <button id="btn-start">Start Game</button>
        </div>
    </div>

    <div class="layout">
        <!-- Left: Game Board -->
        <div class="game-panel">
            <div class="board-container">
                <div class="board-labels-top">
                    <span></span><span>1</span><span>2</span><span>3</span>
                </div>
                <div class="board-with-rows">
                    <div class="row-labels">
                        <span>A</span><span>B</span><span>C</span>
                    </div>
                    <div id="board" class="board"></div>
                </div>
            </div>

            <div id="status" class="status">Click Start Game to begin</div>
            <div id="history" class="history"></div>
            <button id="btn-reset" class="btn-reset" disabled>Reset Board</button>
        </div>

        <!-- Right: Live Stream -->
        <div class="stream-panel">
            <div class="stream-input">
                <input id="stream-url" type="text"
                       placeholder="Paste YouTube or stream URL">
                <button id="btn-load-stream">Load</button>
            </div>
            <div class="stream-container">
                <iframe id="stream-frame" src="" frameborder="0"
                        allow="accelerometer; autoplay; encrypted-media; gyroscope"
                        allowfullscreen></iframe>
                <div id="stream-placeholder" class="stream-placeholder">
                    Paste a YouTube URL above to watch the CNC machine
                </div>
            </div>
        </div>
    </div>

    <!-- Debug log below main layout -->
    <div class="debug-bar">
        <div class="debug-header">
            <span class="debug-title">API Debug</span>
            <button id="btn-clear-log" class="btn-clear">Clear</button>
        </div>
        <div id="debug-log" class="debug-log"></div>
    </div>

    <script src="/static/game.js"></script>
</body>
</html>
